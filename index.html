<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>북한산 다람쥐</title>

<style>
body{
    margin:0;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:sans-serif;
}

.container{
    text-align:center;
}

img{
    width:90%;
    max-width:700px;
    height:auto;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<img id="card" src="Front_v2.png">

<br>

<button onclick="flipCard()">뒷면 보기</button>

</div>

<script>

let front = true;

function flipCard(){

const img=document.getElementById("card");
const btn=document.querySelector("button");

if(front){

img.src="Back_v2.png";
btn.textContent="앞면 보기";

}else{

img.src="Front_v2.png";
btn.textContent="뒷면 보기";

}

front=!front;

}

</script>

</body>

</html>
